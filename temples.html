<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Responsive temple album with gallery and nav">
    <meta name="author" content="Travis Midgley">
    <title>Temple Album</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Roboto:wght@400;500&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="styles/temples.css">
    <link rel="stylesheet" href="styles/temples-large.css">

    <script src="scripts/temples.js" defer></script>
</head>

<body>
    <header>
        <h2>Temple Album</h2>
        <button type="button" id="menu"></button>
        <nav>
            <ul class="navigation">
                <li><a href="#" class="active">Home</a></li>
                <li><a href="#">Old</a></li>
                <li><a href="#">New</a></li>
                <li><a href="#">Large</a></li>
                <li><a href="#">Small</a></li>
            </ul>
        </nav>
    </header>


    <main>
        <h1>Temple Album</h1>

        <div class="gallery">
            <figure>
                <img src="images/temple1.webp" alt="Buenos Aires Argentina Temple" loading="lazy">
                <figcaption>Buenos Aires Argentina Temple</figcaption>
            </figure>

            <figure>
                <img src="images/temple2.webp" alt="Jordan River Utah Temple" loading="lazy">
                <figcaption>Jordan River Utah Temple</figcaption>
            </figure>

            <figure>
                <img src="images/temple3.webp" alt="Manti Utah Temple" loading="lazy">
                <figcaption>Manti Utah Temple</figcaption>
            </figure>

            <figure>
                <img src="images/temple4.webp" alt="McAllen Texas Temple" loading="lazy">
                <figcaption>McAllen Texas Temple</figcaption>
            </figure>

            <figure>
                <img src="images/temple5.webp" alt="Mesa Arizona Temple" loading="lazy">
                <figcaption>Mesa Arizona Temple</figcaption>
            </figure>

            <figure>
                <img src="images/temple6.webp" alt="Monterrey Mexico Temple" loading="lazy">
                <figcaption>Monterrey Mexico Temple</figcaption>
            </figure>

            <figure>
                <img src="images/temple7.webp" alt="Phoenix Arizona Temple" loading="lazy">
                <figcaption>Phoenix Arizona Temple</figcaption>
            </figure>

            <figure>
                <img src="images/temple8.webp" alt="Salt Lake City Temple" loading="lazy">
                <figcaption>Salt Lake City Temple</figcaption>
            </figure>

            <figure>
                <img src="images/temple9.webp" alt="Washington D.C. Temple" loading="lazy">
                <figcaption>Washington D.C. Temple</figcaption>
            </figure>
        </div>
    </main>

    <footer>
        <p>&copy; <span id="currentyear"></span> | Travis Midgley | Arizona</p>
        <p id="lastModified"></p>
    </footer>
</body>

</html>
